<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Codies V6</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:14px;
  background:#111;
}

/* LAYOUT */
.main{display:flex;height:calc(100vh - 55px)}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#0f0f0f;
  padding:12px;
  border-right:1px solid #222;
}

/* FEED */
.feed{
  flex:1;
  overflow:auto;
  padding:20px;
}

/* POST */
.post{
  background:#151515;
  padding:16px;
  border-radius:12px;
  margin-bottom:15px;
  border:1px solid #222;
}

/* INPUTS */
input,textarea{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#1c1c1c;
  border:1px solid #333;
  color:white;
  border-radius:8px;
}

/* BUTTONS */
button{
  width:100%;
  padding:10px;
  margin-top:6px;
  background:linear-gradient(90deg,#00ff88,#00c3ff);
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL SYSTEM */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#141414;
  padding:20px;
  width:350px;
  border-radius:12px;
  border:1px solid #333;
}

/* BADGE */
.badge{color:#00ff88;font-size:12px}

/* ACTIONS */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.actions button{flex:1}
</style>
</head>

<body>

<header>
  <div>Codies V6 🚀</div>
  <div id="userBox"></div>
</header>

<div class="main">

<div class="sidebar">
  <h3>Create</h3>

  <input id="title" placeholder="Title">
  <input id="lang" placeholder="Language">
  <textarea id="code" placeholder="Code"></textarea>

  <button onclick="createPost()">Post</button>

  <input id="search" placeholder="Search..." oninput="loadPosts()">

  <button onclick="openLogin()">Login</button>
  <button id="adminBtn" style="display:none" onclick="openAdmin()">Admin</button>
</div>

<div class="feed" id="feed"></div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="box">
    <h3>Login</h3>
    <input id="email">
    <input id="password" type="password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign up</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="box">
    <h3>Admin Panel</h3>
    <input id="targetUser">

    <button onclick="warn()">Warn</button>
    <button onclick="ban24()">Ban 24h</button>
    <button onclick="perm()">Perm Ban</button>
    <button onclick="verify()">Verify</button>

    <button onclick="closeAdmin()">Close</button>
  </div>
</div>

<script>

/* ================= SUPABASE ================= */
const supabaseUrl="https://heemtxdkjxnlzggtpbsf.supabase.co"
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU"
const client=supabase.createClient(supabaseUrl,supabaseKey)

/* ================= STATE ================= */
let user=null
let profile=null

/* ================= LOAD USER ================= */
async function getUser(){
  const {data}=await client.auth.getUser()
  user=data.user
  if(user) await loadProfile()
  updateUI()
}

/* ================= PROFILE ================= */
async function loadProfile(){
  const {data}=await client
    .from("profiles")
    .select("*")
    .eq("email",user.email)
    .single()

  profile=data
  checkBan()
}

/* ================= GLOBAL BAN CHECK ================= */
function checkBan(){
  if(profile?.banned){
    client.auth.signOut()
    showPopup("You are banned 🚫")
    return true
  }
  return false
}

/* ================= POPUP SYSTEM ================= */
function showPopup(msg){
  const m=document.createElement("div")
  m.style="position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center"
  m.innerHTML=`<div class="box"><h3>${msg}</h3><button onclick="this.parentElement.parentElement.remove()">OK</button></div>`
  document.body.appendChild(m)
}

/* ================= AUTH ================= */
function openLogin(){loginModal.style.display="flex"}
function closeLogin(){loginModal.style.display="none"}

async function login(){
  const {error}=await client.auth.signInWithPassword({
    email:email.value,
    password:password.value
  })
  if(error) return showPopup(error.message)
  closeLogin()
  getUser()
}

async function signup(){
  await client.auth.signUp({
    email:email.value,
    password:password.value,
    options:{emailRedirectTo:"https://mystarsnight.github.io/MystarsnightCode/"}
  })
  showPopup("Check email 📩")
}

/* ================= POSTS ================= */
async function createPost(){
  if(!user||checkBan())return

  await client.from("posts").insert({
    title:title.value,
    language:lang.value,
    code:code.value,
    author:user.email
  })

  loadPosts()
}

async function loadPosts(){
  const {data}=await client.from("posts")
  .select("*")
  .order("created_at",{ascending:false})

  feed.innerHTML=""

  data.forEach(p=>{
    const div=document.createElement("div")
    div.className="post"

    div.innerHTML=`
      <h3>${p.title} ${profile?.verified?"✔":""}</h3>
      <small>${p.language} • ${p.author}</small>
      <pre>${p.code}</pre>

      <div class="actions">
        <button onclick="likePost('${p.id}')">❤️</button>
        <button onclick="comment('${p.id}')">💬</button>
      </div>
    `
    feed.appendChild(div)
  })
}

/* ================= ADMIN ================= */
function isAdmin(){
  return profile?.role==="admin"
}

function openAdmin(){
  if(!isAdmin())return showPopup("Not admin")
  adminModal.style.display="flex"
}

function closeAdmin(){adminModal.style.display="none"}

async function warn(){
  await client.from("warnings").insert({
    user_email:targetUser.value,
    reason:"warn"
  })
  showPopup("Warned")
}

async function ban24(){
  await client.from("profiles").update({
    banned:true,
    ban_until:new Date(Date.now()+86400000)
  }).eq("email",targetUser.value)
}

async function perm(){
  await client.from("profiles").update({
    banned:true
  }).eq("email",targetUser.value)
}

async function verify(){
  await client.from("profiles").update({
    verified:true
  }).eq("email",targetUser.value)
}

/* ================= UI ================= */
function updateUI(){
  userBox.innerHTML=user?user.email:`<button onclick="openLogin()">Login</button>`
  adminBtn.style.display=isAdmin()?"block":"none"
}

/* ================= INIT ================= */
client.auth.onAuthStateChange((_,s)=>{
  if(s){
    user=s.user
    loadProfile()
    updateUI()
  }
})

getUser()
loadPosts()

</script>

</body>
</html>
