<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Codies V3</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  overflow:hidden;
}

/* TOP BAR */
header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#151515;
  position:fixed;
  width:100%;
  top:0;
  z-index:10;
}

/* MAIN LAYOUT */
.main {
  display:flex;
  margin-top:50px;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
  width:280px;
  background:#111;
  padding:10px;
  overflow:auto;
}

/* FEED (TIKTOK STYLE) */
.feed {
  flex:1;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

/* POSTS */
.post {
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;

  opacity:0;
  transform:translateY(40px);
  animation:fadeIn 0.4s forwards;
}

@keyframes fadeIn {
  to {
    opacity:1;
    transform:translateY(0);
  }
}

.card {
  width:70%;
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.02);
}

pre {
  background:black;
  padding:10px;
  overflow:auto;
  border-radius:10px;
}

input, textarea {
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#222;
  border:none;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#00ff88;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
}

/* LOGIN MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:20;
}

.modal-content {
  background:#1a1a1a;
  padding:20px;
  width:300px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <div>Codies V3</div>
  <div id="userBox"></div>
</header>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Create Code</h3>

  <input id="title" placeholder="Title">
  <input id="lang" placeholder="Language">
  <textarea id="code" placeholder="Code"></textarea>

  <button onclick="createPost()">Post</button>

  <input id="search" placeholder="Search..." oninput="loadPosts()">

  <button onclick="openLogin()">Login</button>
  <button onclick="openAdmin()">Admin</button>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <h3>Admin Panel</h3>
    <button onclick="deleteAll()">Delete All Posts</button>
    <button onclick="closeAdmin()">Close</button>
  </div>
</div>

<script>
/* ================= SUPABASE ================= */
const supabaseUrl = "https://heemtxdkjxnlzggtpbsf.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU"

const client = supabase.createClient(supabaseUrl, supabaseKey)

/* ================= ADMIN ================= */
const ADMIN_EMAIL = "blakestalder123@gmail.com"

/* ================= USER ================= */
let user = null

async function getUser() {
  const { data } = await client.auth.getUser()
  user = data.user
  updateUI()
}

/* ================= AUTH ================= */
function openLogin() {
  loginModal.style.display = "flex"
}

function closeLogin() {
  loginModal.style.display = "none"
}

async function login() {
  const { error } = await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  })

  if (error) alert(error.message)
  else {
    closeLogin()
    getUser()
  }
}

async function signup() {
  const { error } = await client.auth.signUp({
    email: email.value,
    password: password.value
  })

  if (error) alert(error.message)
  else alert("Check email")
}

/* ================= POSTS ================= */
async function createPost() {
  if (!user) return alert("Login first")

  await client.from("posts").insert({
    title: title.value,
    language: lang.value,
    code: code.value,
    author: user.email
  })

  loadPosts()
}

async function loadPosts() {
  const search = document.getElementById("search").value.toLowerCase()

  const { data } = await client
    .from("posts")
    .select("*")
    .order("created_at", { ascending:false })

  const feed = document.getElementById("feed")
  feed.innerHTML = ""

  data
    .filter(p =>
      p.title?.toLowerCase().includes(search) ||
      p.language?.toLowerCase().includes(search)
    )
    .forEach(p => {

      const div = document.createElement("div")
      div.className = "post"

      div.innerHTML = `
        <div class="card">
          <h2>${p.title}</h2>
          <small>${p.language} • ${p.author}</small>
          <pre>${p.code}</pre>
          <button onclick="copyCode(\`${p.code.replace(/`/g,'\\`')}\`)">Copy</button>
        </div>
      `

      feed.appendChild(div)
    })
}

function copyCode(text) {
  navigator.clipboard.writeText(text)
}

/* ================= ADMIN ================= */
function openAdmin() {
  if (!user || user.email !== ADMIN_EMAIL) {
    return alert("Not admin")
  }
  adminModal.style.display = "flex"
}

function closeAdmin() {
  adminModal.style.display = "none"
}

async function deleteAll() {
  await client.from("posts").delete().neq("id","")
  loadPosts()
}

/* ================= UI ================= */
function updateUI() {
  userBox.innerHTML = user
    ? `${user.email} <button onclick="client.auth.signOut();location.reload()">Logout</button>`
    : `<button onclick="openLogin()">Login</button>`
}

/* INIT */
getUser()
loadPosts()
</script>

</body>
</html>
