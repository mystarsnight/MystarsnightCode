<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mystarsnight Social</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:white;
}

/* AUTH */
#auth{
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
}

input, textarea{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
  width:240px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(45deg,#00f5ff,#9f00ff);
  color:white;
}

/* APP */
#app{display:none;}

/* TOP */
#top{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111;
}

.tab{
  padding:8px 14px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
}

/* FEED */
.feed{
  height:calc(100vh - 120px);
  overflow-y:auto;
  padding:10px;
}

/* POST */
.post{
  background:#151515;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  max-width:420px;
}

.post img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* AVATAR */
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #00f5ff;
}

/* POST BOX */
#postBox{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* NOTIF */
#notif{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:999;
}
</style>
</head>

<body>

<div id="notif"></div>

<!-- AUTH -->
<div id="auth">
  <h2>Mystarsnight Social</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username">

  <label>Avatar image:</label>
  <input type="file" id="avatarFile">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <div id="top">
    <div class="tab" onclick="show('discover')">🔍 Discover</div>
    <div class="tab" onclick="show('codies')">🎥 Codies</div>
  </div>

  <div class="feed" id="discover"></div>
  <div class="feed" id="codies" style="display:none;"></div>

  <div id="postBox">
    <textarea id="postInput" placeholder="Write post..."></textarea>
    <input type="file" id="postFile">
    <button onclick="post()">Post 🚀</button>
  </div>

</div>

<script>
const supabase = supabase.createClient(
"https://heemtxdkjxnlzggtpbsf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU"
);

let user=null;
let offset=0;
const limit=5;

/* NOTIF */
function notify(t){
  notif.innerText=t;
  notif.style.display="block";
  setTimeout(()=>notif.style.display="none",2000);
}

/* UPLOAD FILE */
async function upload(bucket,file){
  const name = Date.now()+"_"+file.name;

  const { error } = await supabase.storage
    .from(bucket)
    .upload(name,file);

  if(error) return null;

  return supabase.storage.from(bucket).getPublicUrl(name).data.publicUrl;
}

/* SIGNUP (FIXED + AVATAR FILE) */
async function signup(){

  const { data, error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  if(error){
    notify(error.message);
    return;
  }

  const u = data.user;
  if(!u){
    notify("Check email to confirm signup");
    return;
  }

  let avatarUrl = null;

  if(avatarFile.files.length > 0){
    avatarUrl = await upload("avatars", avatarFile.files[0]);
  }

  await supabase.from("profiles").insert({
    id: u.id,
    username: username.value,
    avatar_url: avatarUrl,
    is_admin: email.value==="blakestalder123@gmail.com"
  });

  notify("Signup complete");
}

/* LOGIN */
async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    notify(error.message);
    return;
  }

  start(data.user);
}

/* START */
async function start(u){

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id",u.id)
    .single();

  user=data;

  auth.style.display="none";
  app.style.display="block";

  loadMore(true);
  loadCodies(true);

  setupScroll();
}

/* INFINITE SCROLL */
function setupScroll(){
  discover.addEventListener("scroll",()=>{
    if(discover.scrollTop + discover.clientHeight >= discover.scrollHeight - 10){
      loadMore(false);
    }
  });
}

/* LOAD DISCOVER (INFINITE) */
async function loadMore(reset){

  if(reset){
    discover.innerHTML="";
    offset=0;
  }

  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username, avatar_url)")
    .order("created_at",{ascending:false})
    .range(offset, offset + limit - 1);

  offset += limit;

  data.forEach(p=>{
    discover.innerHTML+=`
      <div class="post">
        <div style="display:flex;gap:10px;align-items:center;">
          <img class="avatar" src="${p.profiles?.avatar_url||''}">
          <b>${p.profiles?.username||"User"}</b>
        </div>

        <p>${p.content}</p>
        ${p.image ? `<img src="${p.image}">` : ""}
      </div>
    `;
  });
}

/* CODIES */
async function loadCodies(){
  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at",{ascending:false})
    .limit(20);

  codies.innerHTML="";

  data.forEach(p=>{
    codies.innerHTML+=`
      <div class="post">
        <b>${p.profiles?.username||"User"}</b>
        <p>${p.content}</p>
        ${p.image ? `<img src="${p.image}">` : ""}
      </div>
    `;
  });
}

/* POST */
async function post(){

  let img=null;

  if(postFile.files.length>0){
    img = await upload("posts", postFile.files[0]);
  }

  await supabase.from("posts").insert({
    user_id:user.id,
    content:postInput.value,
    image:img
  });

  postInput.value="";
  postFile.value="";

  loadMore(true);
  loadCodies();
}

/* TAB */
function show(tab){
  discover.style.display = tab==="discover"?"block":"none";
  codies.style.display = tab==="codies"?"block":"none";
}
</script>

</body>
</html>
