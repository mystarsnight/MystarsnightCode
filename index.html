);

let user=null;

/* UI MESSAGE */
function showMsg(t){
  msg.innerText=t;
  msg.style.display="block";
  setTimeout(()=>msg.style.display="none",2000);
}

/* 🔥 FIXED SIGNUP (THIS IS THE IMPORTANT PART) */
async function signup(){

  if(!email.value || !password.value || !username.value){
    showMsg("Fill all fields");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  if(error){
    showMsg("Signup failed: " + error.message);
    return;
  }

  const u = data.user;

  if(!u){
    showMsg("Check email to confirm signup");
    return;
  }

  const { error: profileError } = await supabase.from("profiles").insert({
    id: u.id,
    username: username.value
  });

  if(profileError){
    showMsg("Profile error: " + profileError.message);
    return;
  }

  showMsg("Signup success! Now login");
}

/* LOGIN */
async function login(){

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    showMsg("Login failed: " + error.message);
    return;
  }

  start(data.user);
}

/* START APP */
async function start(u){

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id",u.id)
    .single();

  user=data;

  auth.style.display="none";
  app.style.display="block";

  loadDiscover();
  loadCodies();
}

/* TABS */
function show(tab){
  discover.style.display = tab==="discover"?"block":"none";
  codies.style.display = tab==="codies"?"block":"none";
}

/* LOAD DISCOVER */
async function loadDiscover(){
  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at",{ascending:false});

  discover.innerHTML="";

  data.forEach(p=>{
    discover.innerHTML+=`
      <div class="post">
        <b>${p.profiles?.username||"User"}</b>
        <p>${p.content}</p>
      </div>
    `;
  });
}

/* LOAD CODIES */
async function loadCodies(){
  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at",{ascending:false});

  codies.innerHTML="";

  data.forEach(p=>{
    codies.innerHTML+=`
      <div class="codiesPost">
        <h2>${p.profiles?.username||"User"}</h2>
        <p>${p.content}</p>
      </div>
    `;
  });
}

/* POST */
async function post(){
  await supabase.from("posts").insert({
    user_id:user.id,
    content:postInput.value
  });

  postInput.value="";
  loadDiscover();
  loadCodies();
}
</script>
